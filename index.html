<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Vintage Camera</title>
  <style>
    :root {
      --bg: #050507;
      --panel: rgba(14, 14, 18, 0.9);
      --line: rgba(255,255,255,.08);
      --text: #f5f5f7;
      --muted: rgba(255,255,255,.68);
      --shadow: 0 24px 60px rgba(0,0,0,.4);
      --radius: 30px;
      --button-shadow: 0 12px 30px rgba(0,0,0,.28);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(255,255,255,.06), transparent 25%),
        linear-gradient(180deg, #11131a, #050507 72%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    body { padding: 10px; }

    .app {
      width: 100%;
      min-height: calc(100dvh - 20px);
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    .camera-shell {
      width: min(100%, 980px);
      min-height: 100%;
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015));
      border: 1px solid var(--line);
      border-radius: 34px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .viewer {
      position: relative;
      flex: 1 1 auto;
      min-height: min(76dvh, 960px);
      overflow: hidden;
      border-radius: var(--radius);
      background: #000;
      border: 1px solid rgba(255,255,255,.08);
    }

    video,
    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
    }

    video { display: none; }

    #preview,
    #output {
      object-fit: cover;
      image-rendering: auto;
    }

    #output {
      display: none;
      z-index: 1;
    }

    .viewer::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,0) 16%, rgba(0,0,0,.08) 100%);
      mix-blend-mode: screen;
      z-index: 3;
    }

    .hud {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
    }

    .mode-badge,
    .icon-btn,
    .toast {
      position: absolute;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.1);
      box-shadow: 0 10px 30px rgba(0,0,0,.24);
      background: rgba(0,0,0,.4);
      color: rgba(255,255,255,.96);
    }

    .mode-badge {
      left: 12px;
      top: 12px;
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 11px;
      letter-spacing: .06em;
      text-transform: uppercase;
      line-height: 1;
    }

    .icon-btn {
      right: 12px;
      top: 12px;
      width: 44px;
      height: 44px;
      border-radius: 999px;
      pointer-events: auto;
      display: grid;
      place-items: center;
      cursor: pointer;
      appearance: none;
      font: inherit;
    }

    .icon-btn:active { transform: scale(.98); }

    .icon-btn svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .toast {
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 12px;
      white-space: nowrap;
      display: none;
      max-width: calc(100% - 24px);
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 2px 2px 4px;
    }

    .mode-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 2px;
    }

    .mode-row::-webkit-scrollbar { display: none; }

    .mode-chip,
    .pill-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.06);
      color: var(--text);
      border-radius: 999px;
      padding: 9px 11px;
      font: inherit;
      font-size: 12px;
      letter-spacing: .02em;
      cursor: pointer;
      transition: transform .15s ease, background .15s ease, border-color .15s ease, opacity .15s ease;
      white-space: nowrap;
      box-shadow: var(--button-shadow);
    }

    .mode-chip:active,
    .pill-btn:active { transform: scale(.98); }

    .mode-chip.active {
      background: rgba(255,255,255,.16);
      border-color: rgba(255,255,255,.22);
    }

    .capture-row {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .capture-btn {
      appearance: none;
      width: 74px;
      height: 74px;
      border-radius: 999px;
      border: 4px solid rgba(255,255,255,.92);
      background: transparent;
      padding: 0;
      display: grid;
      place-items: center;
      cursor: pointer;
      box-shadow: var(--button-shadow);
      transition: transform .15s ease, opacity .15s ease;
    }

    .capture-btn::before {
      content: "";
      width: 54px;
      height: 54px;
      border-radius: 999px;
      background: #ff3b30;
      box-shadow: inset 0 -10px 16px rgba(0,0,0,.14), inset 0 10px 14px rgba(255,255,255,.14);
    }

    .capture-btn:active { transform: scale(.97); }
    .capture-btn:disabled { opacity: .55; cursor: wait; }

    .capture-actions {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
    }

    .capture-actions.show { display: flex; }

    .hidden { display: none !important; }

    @media (max-width: 720px) {
      body { padding: 0; }
      .app { min-height: 100dvh; }
      .camera-shell {
        width: 100%;
        border-radius: 0;
        min-height: 100dvh;
        padding: 8px;
      }
      .viewer {
        min-height: calc(100dvh - 154px);
        border-radius: 24px;
      }
      .mode-chip,
      .pill-btn {
        padding: 8px 10px;
        font-size: 11px;
      }
      .capture-btn {
        width: 76px;
        height: 76px;
      }
      .capture-btn::before {
        width: 56px;
        height: 56px;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="appRoot">
    <div class="camera-shell" id="cameraShell">
      <div class="viewer" id="viewer">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="preview"></canvas>
        <canvas id="output"></canvas>
        <div class="hud">
          <div id="modeBadge" class="mode-badge">Disposable</div>
          <button id="fullscreenBtn" class="icon-btn" type="button" aria-label="Toggle fullscreen">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8 3H3v5"></path>
              <path d="M16 3h5v5"></path>
              <path d="M21 16v5h-5"></path>
              <path d="M8 21H3v-5"></path>
            </svg>
          </button>
          <div id="toast" class="toast"></div>
        </div>
      </div>

      <div class="controls">
        <div class="mode-row" id="modeRow" aria-label="Camera looks"></div>

        <div class="capture-row">
          <button id="captureBtn" class="capture-btn" type="button" aria-label="Capture photo" disabled></button>
          <div id="captureActions" class="capture-actions" aria-live="polite">
            <button id="retakeBtn" class="pill-btn" type="button">Retake</button>
            <button id="saveBtn" class="pill-btn" type="button">Save</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const video = document.getElementById('video');
    const preview = document.getElementById('preview');
    const output = document.getElementById('output');
    const captureBtn = document.getElementById('captureBtn');
    const retakeBtn = document.getElementById('retakeBtn');
    const saveBtn = document.getElementById('saveBtn');
    const captureActions = document.getElementById('captureActions');
    const viewer = document.getElementById('viewer');
    const modeBadge = document.getElementById('modeBadge');
    const modeRow = document.getElementById('modeRow');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const toast = document.getElementById('toast');
    const appRoot = document.getElementById('appRoot');

    const MODES = {
      disposable: {
        badge: 'Disposable',
        label: 'Disposable',
        filePrefix: 'disposable_flash',
        previewLongEdge: 780,
        maxLongEdge: 1480,
        outputQuality: 0.9,
        profile: {
          contrast: 1.14,
          exposure: 1.08,
          saturation: 1.05,
          warmthR: 1.08,
          warmthG: 1.01,
          warmthB: 0.92,
          blackLift: 12,
          highlightPush: 0.28,
          noise: 18,
          colorNoise: 9,
          vignette: 0.18,
          hotspot: 0.15,
          chromaShift: 1.3,
          sharpen: 0.08,
          flashBloom: 0.2,
          barrel: 0,
          blockiness: 0.36,
          haze: 0.05,
          magentaBoost: 3,
          coolBoost: 0,
          lowLightExposureBoost: 0.08,
          lowLightNoiseBoost: 4,
          lowLightBloomBoost: 0.08,
          lowLightContrastBoost: 0.03
        }
      },
      ccd: {
        badge: 'CCD digicam',
        label: 'CCD digicam',
        filePrefix: 'ccd_digicam',
        previewLongEdge: 820,
        maxLongEdge: 1540,
        outputQuality: 0.92,
        profile: {
          contrast: 0.96,
          exposure: 1.05,
          saturation: 0.9,
          warmthR: 0.98,
          warmthG: 1.01,
          warmthB: 1.08,
          blackLift: 13,
          highlightPush: 0.12,
          noise: 11,
          colorNoise: 5,
          vignette: 0.1,
          hotspot: 0.04,
          chromaShift: 0.9,
          sharpen: 0.13,
          flashBloom: 0.01,
          barrel: 0,
          blockiness: 0.18,
          haze: 0.08,
          magentaBoost: 0,
          coolBoost: 4,
          lowLightExposureBoost: 0.06,
          lowLightNoiseBoost: 3,
          lowLightBloomBoost: 0.01,
          lowLightContrastBoost: 0.01
        }
      },
      instant: {
        badge: 'Instant soft',
        label: 'Instant soft',
        filePrefix: 'instant_soft',
        previewLongEdge: 780,
        maxLongEdge: 1480,
        outputQuality: 0.91,
        profile: {
          contrast: 0.86,
          exposure: 1.05,
          saturation: 0.82,
          warmthR: 1.05,
          warmthG: 1.0,
          warmthB: 0.95,
          blackLift: 20,
          highlightPush: 0.08,
          noise: 13,
          colorNoise: 5,
          vignette: 0.08,
          hotspot: 0.03,
          chromaShift: 0.45,
          sharpen: 0.01,
          blur: 0.14,
          flashBloom: 0.05,
          barrel: 0,
          blockiness: 0.05,
          haze: 0.18,
          magentaBoost: 2.5,
          coolBoost: 1,
          edgeFade: 0.24,
          lowLightExposureBoost: 0.05,
          lowLightNoiseBoost: 2,
          lowLightBloomBoost: 0.02,
          lowLightContrastBoost: 0.01
        }
      }
    };

    const STATE = {
      mode: 'disposable',
      stream: null,
      captured: false,
      lastBlobUrl: '',
      toastTimer: 0,
      previewRAF: 0,
      lastPreviewTick: 0,
      previewFPS: 10
    };

    function clamp(value, min = 0, max = 255) {
      return Math.max(min, Math.min(max, value));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function fitSize(width, height, maxLongEdge) {
      const longEdge = Math.max(width, height);
      if (longEdge <= maxLongEdge) return { width, height };
      const scale = maxLongEdge / longEdge;
      return {
        width: Math.max(1, Math.round(width * scale)),
        height: Math.max(1, Math.round(height * scale))
      };
    }

    function showToast(message, sticky = false) {
      toast.textContent = message;
      toast.style.display = 'block';
      clearTimeout(STATE.toastTimer);
      if (!sticky) {
        STATE.toastTimer = window.setTimeout(() => {
          toast.style.display = 'none';
        }, 1800);
      }
    }

    function hideToast() {
      clearTimeout(STATE.toastTimer);
      toast.style.display = 'none';
    }

    function getViewerAspect() {
      return viewer.clientWidth && viewer.clientHeight
        ? viewer.clientWidth / viewer.clientHeight
        : 4 / 3;
    }

    function getCoverCrop(srcWidth, srcHeight, targetAspect) {
      const srcAspect = srcWidth / srcHeight;
      let sx = 0;
      let sy = 0;
      let sw = srcWidth;
      let sh = srcHeight;

      if (srcAspect > targetAspect) {
        sw = srcHeight * targetAspect;
        sx = (srcWidth - sw) / 2;
      } else {
        sh = srcWidth / targetAspect;
        sy = (srcHeight - sh) / 2;
      }

      return { sx, sy, sw, sh };
    }

    function sceneStats(data) {
      let lum = 0;
      let sat = 0;
      let samples = 0;

      for (let i = 0; i < data.length; i += 32) {
        const r = data[i];
        const g = data[i + 1];
        const b = data[i + 2];
        const max = Math.max(r, g, b);
        const min = Math.min(r, g, b);

        lum += 0.2126 * r + 0.7152 * g + 0.0722 * b;
        sat += max === 0 ? 0 : (max - min) / max;
        samples++;
      }

      return {
        luminance: lum / Math.max(1, samples),
        saturation: sat / Math.max(1, samples)
      };
    }

    function buildProfile(modeKey, stats) {
      const base = MODES[modeKey].profile;
      const lowLight = stats.luminance < 104;
      const darkAmount = clamp((122 - stats.luminance) / 90, 0, 1);
      const saturationBias = clamp((stats.saturation - 0.32) * 1.6, -0.12, 0.12);

      return {
        contrast: base.contrast + (lowLight ? base.lowLightContrastBoost * darkAmount : 0),
        exposure: base.exposure + (lowLight ? base.lowLightExposureBoost * darkAmount : 0),
        saturation: base.saturation + saturationBias,
        warmthR: base.warmthR,
        warmthG: base.warmthG,
        warmthB: base.warmthB,
        blackLift: base.blackLift,
        highlightPush: base.highlightPush,
        noise: base.noise + (lowLight ? base.lowLightNoiseBoost * darkAmount : 0),
        colorNoise: base.colorNoise + (lowLight ? 1.2 * darkAmount : 0),
        vignette: base.vignette,
        hotspot: base.hotspot + (lowLight ? 0.03 * darkAmount : 0),
        chromaShift: base.chromaShift,
        sharpen: base.sharpen,
        blur: base.blur || 0,
        flashBloom: base.flashBloom + (lowLight ? base.lowLightBloomBoost * darkAmount : 0),
        barrel: base.barrel,
        blockiness: base.blockiness,
        haze: base.haze + (lowLight ? 0.03 * darkAmount : 0),
        magentaBoost: base.magentaBoost,
        coolBoost: base.coolBoost,
        edgeFade: base.edgeFade || 0,
        lowLight
      };
    }

    function drawCoveredFrame(targetCanvas, longEdgeCap) {
      const sourceWidth = video.videoWidth;
      const sourceHeight = video.videoHeight;
      const aspect = getViewerAspect();
      const crop = getCoverCrop(sourceWidth, sourceHeight, aspect);
      const fitted = fitSize(crop.sw, crop.sh, longEdgeCap);

      targetCanvas.width = fitted.width;
      targetCanvas.height = fitted.height;

      const ctx = targetCanvas.getContext('2d', { willReadFrequently: true });
      ctx.imageSmoothingEnabled = true;
      ctx.drawImage(
        video,
        crop.sx, crop.sy, crop.sw, crop.sh,
        0, 0, fitted.width, fitted.height
      );

      return { ctx, crop, width: fitted.width, height: fitted.height };
    }

    function applyBarrelWarp(sourceCanvas, amount) {
      if (!amount) return sourceCanvas;

      const width = sourceCanvas.width;
      const height = sourceCanvas.height;
      const srcCtx = sourceCanvas.getContext('2d', { willReadFrequently: true });
      const srcFrame = srcCtx.getImageData(0, 0, width, height);
      const src = srcFrame.data;

      const warpedCanvas = document.createElement('canvas');
      warpedCanvas.width = width;
      warpedCanvas.height = height;
      const dstCtx = warpedCanvas.getContext('2d', { willReadFrequently: true });
      const dstFrame = dstCtx.createImageData(width, height);
      const dst = dstFrame.data;

      const cx = width / 2;
      const cy = height / 2;
      const maxRadius = Math.sqrt(cx * cx + cy * cy);

      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const dx = (x - cx) / maxRadius;
          const dy = (y - cy) / maxRadius;
          const r2 = dx * dx + dy * dy;
          const factor = 1 - amount * r2;
          const sx = Math.round(cx + (x - cx) * factor);
          const sy = Math.round(cy + (y - cy) * factor);
          const di = ((y * width) + x) * 4;

          if (sx < 0 || sy < 0 || sx >= width || sy >= height) {
            dst[di] = 0;
            dst[di + 1] = 0;
            dst[di + 2] = 0;
            dst[di + 3] = 255;
            continue;
          }

          const si = ((sy * width) + sx) * 4;
          dst[di] = src[si];
          dst[di + 1] = src[si + 1];
          dst[di + 2] = src[si + 2];
          dst[di + 3] = 255;
        }
      }

      dstCtx.putImageData(dstFrame, 0, 0);
      return warpedCanvas;
    }

    function downsampleSoft(ctx, sourceCanvas, width, height, scale = 0.76) {
      const softCanvas = document.createElement('canvas');
      softCanvas.width = Math.max(1, Math.round(width * scale));
      softCanvas.height = Math.max(1, Math.round(height * scale));
      const softCtx = softCanvas.getContext('2d');
      softCtx.imageSmoothingEnabled = true;
      softCtx.drawImage(sourceCanvas, 0, 0, softCanvas.width, softCanvas.height);
      ctx.imageSmoothingEnabled = true;
      ctx.drawImage(softCanvas, 0, 0, softCanvas.width, softCanvas.height, 0, 0, width, height);
    }

    function blurPass(ctx, width, height, amount) {
      if (amount <= 0.005) return;

      const softCanvas = document.createElement('canvas');
      const softScale = Math.max(0.58, 1 - amount * 0.55);
      softCanvas.width = Math.max(1, Math.round(width * softScale));
      softCanvas.height = Math.max(1, Math.round(height * softScale));
      const sctx = softCanvas.getContext('2d');
      sctx.imageSmoothingEnabled = true;
      sctx.drawImage(ctx.canvas, 0, 0, softCanvas.width, softCanvas.height);

      ctx.save();
      ctx.globalAlpha = Math.min(0.42, 0.18 + amount * 0.85);
      ctx.filter = `blur(${Math.max(1.2, width * amount * 0.006)}px)`;
      ctx.drawImage(softCanvas, 0, 0, softCanvas.width, softCanvas.height, 0, 0, width, height);
      ctx.restore();
    }

    function drawSoftEdgeFade(ctx, width, height, strength) {
      if (strength <= 0.01) return;

      const fade = ctx.createRadialGradient(
        width / 2, height / 2, Math.min(width, height) * 0.28,
        width / 2, height / 2, Math.max(width, height) * 0.82
      );
      fade.addColorStop(0, 'rgba(255,247,238,0)');
      fade.addColorStop(0.66, `rgba(255,247,238,${strength * 0.08})`);
      fade.addColorStop(1, `rgba(255,247,238,${strength * 0.34})`);
      ctx.save();
      ctx.fillStyle = fade;
      ctx.fillRect(0, 0, width, height);
      ctx.restore();
    }

    function primaryColorPass(imageData, width, height, profile) {
      const data = imageData.data;
      const cx = width / 2;
      const cy = height / 2;
      const maxDist = Math.sqrt(cx * cx + cy * cy);

      for (let i = 0; i < data.length; i += 4) {
        const px = (i / 4) % width;
        const py = Math.floor((i / 4) / width);
        const dx = px - cx;
        const dy = py - cy;
        const dist = Math.sqrt(dx * dx + dy * dy) / maxDist;
        const radial = Math.min(1, dist);

        let r = data[i];
        let g = data[i + 1];
        let b = data[i + 2];

        r = ((r - 128) * profile.contrast + 128) * profile.exposure;
        g = ((g - 128) * profile.contrast + 128) * profile.exposure;
        b = ((b - 128) * profile.contrast + 128) * profile.exposure;

        const lumaBeforeSat = 0.2126 * r + 0.7152 * g + 0.0722 * b;
        r = lumaBeforeSat + (r - lumaBeforeSat) * profile.saturation;
        g = lumaBeforeSat + (g - lumaBeforeSat) * profile.saturation;
        b = lumaBeforeSat + (b - lumaBeforeSat) * profile.saturation;

        r = r * profile.warmthR + profile.blackLift + profile.magentaBoost;
        g = g * profile.warmthG + profile.blackLift * 0.84;
        b = b * profile.warmthB + profile.blackLift + profile.coolBoost;

        const luma = 0.2126 * r + 0.7152 * g + 0.0722 * b;
        const hot = profile.hotspot * Math.pow(1 - radial, 2.3);
        const vig = 1 - profile.vignette * Math.pow(radial, 1.85);

        if (luma > 170) {
          const bump = (luma - 170) * profile.highlightPush;
          r += bump;
          g += bump;
          b += bump;
        }

        if (profile.haze > 0) {
          const hazeGain = profile.haze * (1 - radial * 0.65);
          r = lerp(r, 233, hazeGain * 0.2);
          g = lerp(g, 231, hazeGain * 0.2);
          b = lerp(b, 228, hazeGain * 0.2);
        }

        const monoNoise = (Math.random() * 2 - 1) * profile.noise;
        const cNoiseR = (Math.random() * 2 - 1) * profile.colorNoise;
        const cNoiseG = (Math.random() * 2 - 1) * profile.colorNoise;
        const cNoiseB = (Math.random() * 2 - 1) * profile.colorNoise;

        r = (r + monoNoise + cNoiseR) * vig + hot * 255;
        g = (g + monoNoise + cNoiseG) * vig + hot * 249;
        b = (b + monoNoise + cNoiseB) * vig + hot * 244;

        data[i] = clamp(r);
        data[i + 1] = clamp(g);
        data[i + 2] = clamp(b);
      }

      return imageData;
    }

    function chromaticAberrationPass(imageData, width, height, profile) {
      const src = new Uint8ClampedArray(imageData.data);
      const data = imageData.data;
      const cx = width / 2;
      const cy = height / 2;
      const maxDist = Math.sqrt(cx * cx + cy * cy);
      const index = (x, y) => ((y * width) + x) * 4;

      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const dx = x - cx;
          const dy = y - cy;
          const dist = Math.sqrt(dx * dx + dy * dy) / maxDist;
          if (dist < 0.18) continue;

          const shift = Math.max(0, Math.round(profile.chromaShift * dist));
          const rx = Math.max(0, Math.min(width - 1, x + Math.sign(dx || 1) * shift));
          const bx = Math.max(0, Math.min(width - 1, x - Math.sign(dx || 1) * shift));
          const ry = Math.max(0, Math.min(height - 1, y + Math.sign(dy || 1) * shift));
          const by = Math.max(0, Math.min(height - 1, y - Math.sign(dy || 1) * shift));

          const i = index(x, y);
          const ir = index(rx, ry);
          const ib = index(bx, by);

          data[i] = src[ir];
          data[i + 2] = src[ib + 2];
        }
      }

      return imageData;
    }

    function flashBloomPass(ctx, width, height, amount) {
      if (amount <= 0.01) return;

      const bloomCanvas = document.createElement('canvas');
      bloomCanvas.width = Math.max(1, Math.round(width * 0.3));
      bloomCanvas.height = Math.max(1, Math.round(height * 0.3));
      const bctx = bloomCanvas.getContext('2d');
      bctx.filter = `blur(${Math.max(7, Math.round(width * 0.012))}px) brightness(${1 + amount * 1.6})`;
      bctx.drawImage(ctx.canvas, 0, 0, bloomCanvas.width, bloomCanvas.height);

      ctx.save();
      ctx.globalAlpha = 0.18 + amount * 0.42;
      ctx.filter = `blur(${Math.max(6, Math.round(width * 0.005))}px)`;
      ctx.drawImage(bloomCanvas, 0, 0, bloomCanvas.width, bloomCanvas.height, 0, 0, width, height);
      ctx.restore();
    }

    function sharpenPass(ctx, width, height, amount) {
      if (amount <= 0) return;

      const base = ctx.getImageData(0, 0, width, height);
      const blurredCanvas = document.createElement('canvas');
      blurredCanvas.width = Math.max(1, Math.round(width * 0.88));
      blurredCanvas.height = Math.max(1, Math.round(height * 0.88));
      const bctx = blurredCanvas.getContext('2d');
      bctx.drawImage(ctx.canvas, 0, 0, blurredCanvas.width, blurredCanvas.height);

      const tmpCanvas = document.createElement('canvas');
      tmpCanvas.width = width;
      tmpCanvas.height = height;
      const tctx = tmpCanvas.getContext('2d');
      tctx.drawImage(blurredCanvas, 0, 0, blurredCanvas.width, blurredCanvas.height, 0, 0, width, height);

      const blur = tctx.getImageData(0, 0, width, height);
      const bd = base.data;
      const sd = blur.data;

      for (let i = 0; i < bd.length; i += 4) {
        bd[i] = clamp(bd[i] + (bd[i] - sd[i]) * amount);
        bd[i + 1] = clamp(bd[i + 1] + (bd[i + 1] - sd[i + 1]) * amount);
        bd[i + 2] = clamp(bd[i + 2] + (bd[i + 2] - sd[i + 2]) * amount);
      }

      ctx.putImageData(base, 0, 0);
    }

    function blockArtifactsPass(ctx, width, height, strength) {
      if (strength <= 0) return;

      const blockCanvas = document.createElement('canvas');
      const blockScale = 0.22 - Math.min(0.08, strength * 0.06);
      blockCanvas.width = Math.max(1, Math.round(width * blockScale));
      blockCanvas.height = Math.max(1, Math.round(height * blockScale));
      const bctx = blockCanvas.getContext('2d');
      bctx.imageSmoothingEnabled = true;
      bctx.drawImage(ctx.canvas, 0, 0, blockCanvas.width, blockCanvas.height);

      ctx.save();
      ctx.globalAlpha = 0.1 + strength * 0.18;
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(blockCanvas, 0, 0, blockCanvas.width, blockCanvas.height, 0, 0, width, height);
      ctx.restore();
    }

    function drawVignette(ctx, width, height, strength) {
      const gradient = ctx.createRadialGradient(
        width / 2, height / 2, Math.min(width, height) * 0.18,
        width / 2, height / 2, Math.max(width, height) * 0.72
      );
      gradient.addColorStop(0, 'rgba(0,0,0,0)');
      gradient.addColorStop(0.65, `rgba(0,0,0,${strength * 0.12})`);
      gradient.addColorStop(1, `rgba(0,0,0,${strength * 0.48})`);
      ctx.save();
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);
      ctx.restore();
    }

    function compositeToCanvas(renderCanvas, targetCanvas) {
      targetCanvas.width = renderCanvas.width;
      targetCanvas.height = renderCanvas.height;
      const ctx = targetCanvas.getContext('2d');
      ctx.clearRect(0, 0, targetCanvas.width, targetCanvas.height);
      ctx.drawImage(renderCanvas, 0, 0);
    }

    function processFrame(modeKey, longEdgeCap) {
      const sourceWidth = video.videoWidth;
      const sourceHeight = video.videoHeight;
      if (!sourceWidth || !sourceHeight) return null;

      let sourceCanvas = document.createElement('canvas');
      const { ctx: sourceCtx, width, height } = drawCoveredFrame(sourceCanvas, longEdgeCap);
      const scan = sourceCtx.getImageData(0, 0, width, height);
      const stats = sceneStats(scan.data);
      const profile = buildProfile(modeKey, stats);

      if (profile.barrel) {
        sourceCanvas = applyBarrelWarp(sourceCanvas, profile.barrel);
      }

      const renderCanvas = document.createElement('canvas');
      renderCanvas.width = sourceCanvas.width;
      renderCanvas.height = sourceCanvas.height;
      const rctx = renderCanvas.getContext('2d', { willReadFrequently: true });

      rctx.clearRect(0, 0, renderCanvas.width, renderCanvas.height);
      downsampleSoft(rctx, sourceCanvas, renderCanvas.width, renderCanvas.height, 0.76);

      let frame = rctx.getImageData(0, 0, renderCanvas.width, renderCanvas.height);
      frame = primaryColorPass(frame, renderCanvas.width, renderCanvas.height, profile);
      frame = chromaticAberrationPass(frame, renderCanvas.width, renderCanvas.height, profile);
      rctx.putImageData(frame, 0, 0);

      flashBloomPass(rctx, renderCanvas.width, renderCanvas.height, profile.flashBloom);
      blurPass(rctx, renderCanvas.width, renderCanvas.height, profile.blur);
      sharpenPass(rctx, renderCanvas.width, renderCanvas.height, profile.sharpen);
      blockArtifactsPass(rctx, renderCanvas.width, renderCanvas.height, profile.blockiness);
      drawVignette(rctx, renderCanvas.width, renderCanvas.height, profile.vignette);
      drawSoftEdgeFade(rctx, renderCanvas.width, renderCanvas.height, profile.edgeFade);

      return {
        canvas: renderCanvas,
        profile
      };
    }

    function syncPreviewCanvas() {
      const dpr = Math.min(window.devicePixelRatio || 1, 1.4);
      const width = Math.max(1, Math.round(viewer.clientWidth * dpr));
      const height = Math.max(1, Math.round(viewer.clientHeight * dpr));
      if (preview.width !== width || preview.height !== height) {
        preview.width = width;
        preview.height = height;
      }
    }

    function renderPreview(now = 0) {
      if (STATE.captured) {
        STATE.previewRAF = requestAnimationFrame(renderPreview);
        return;
      }

      if (video.readyState < 2) {
        STATE.previewRAF = requestAnimationFrame(renderPreview);
        return;
      }

      const frameInterval = 1000 / STATE.previewFPS;
      if (now - STATE.lastPreviewTick < frameInterval) {
        STATE.previewRAF = requestAnimationFrame(renderPreview);
        return;
      }

      STATE.lastPreviewTick = now;
      syncPreviewCanvas();

      const mode = MODES[STATE.mode];
      const result = processFrame(STATE.mode, mode.previewLongEdge);
      if (result) {
        const pctx = preview.getContext('2d');
        pctx.clearRect(0, 0, preview.width, preview.height);
        pctx.imageSmoothingEnabled = true;
        pctx.drawImage(result.canvas, 0, 0, preview.width, preview.height);
      }

      STATE.previewRAF = requestAnimationFrame(renderPreview);
    }

    function startPreviewLoop() {
      cancelAnimationFrame(STATE.previewRAF);
      STATE.lastPreviewTick = 0;
      STATE.previewRAF = requestAnimationFrame(renderPreview);
    }

    function setMode(modeKey) {
      STATE.mode = modeKey;
      const mode = MODES[modeKey];
      modeBadge.textContent = mode.badge;

      Array.from(modeRow.querySelectorAll('.mode-chip')).forEach((button) => {
        button.classList.toggle('active', button.dataset.mode === modeKey);
      });

      if (!STATE.captured && video.readyState >= 2) {
        const result = processFrame(STATE.mode, mode.previewLongEdge);
        if (result) {
          syncPreviewCanvas();
          const pctx = preview.getContext('2d');
          pctx.clearRect(0, 0, preview.width, preview.height);
          pctx.drawImage(result.canvas, 0, 0, preview.width, preview.height);
        }
      }
    }

    function buildModeButtons() {
      const fragment = document.createDocumentFragment();
      Object.entries(MODES).forEach(([key, value]) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'mode-chip';
        button.textContent = value.label;
        button.dataset.mode = key;
        button.addEventListener('click', () => {
          if (STATE.captured) return;
          setMode(key);
        });
        fragment.appendChild(button);
      });
      modeRow.appendChild(fragment);
      setMode(STATE.mode);
    }

    async function capturePhoto() {
      if (STATE.captured || video.readyState < 2) return;

      captureBtn.disabled = true;
      showToast('Processing…', true);

      const mode = MODES[STATE.mode];
      const result = processFrame(STATE.mode, mode.maxLongEdge);

      if (!result) {
        captureBtn.disabled = false;
        showToast('Could not capture frame');
        return;
      }

      compositeToCanvas(result.canvas, output);
      preview.style.display = 'none';
      output.style.display = 'block';

      STATE.captured = true;
      captureBtn.classList.add('hidden');
      captureActions.classList.add('show');
      hideToast();
      showToast('Tap save to download');
      captureBtn.disabled = false;
    }

    function retake() {
      output.style.display = 'none';
      preview.style.display = 'block';
      STATE.captured = false;
      captureActions.classList.remove('show');
      captureBtn.classList.remove('hidden');
      hideToast();
      setMode(STATE.mode);
    }

    async function saveCurrentImage() {
      const quality = MODES[STATE.mode].outputQuality;
      const blob = await new Promise(resolve => output.toBlob(resolve, 'image/jpeg', quality));
      if (!blob) return;

      if (STATE.lastBlobUrl) URL.revokeObjectURL(STATE.lastBlobUrl);
      STATE.lastBlobUrl = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = STATE.lastBlobUrl;
      a.download = `${MODES[STATE.mode].filePrefix}_${Date.now()}.jpg`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      showToast('Saved');
    }

    async function startCamera() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showToast('Camera not available in this browser', true);
        return;
      }

      const preferred = {
        audio: false,
        video: {
          facingMode: { ideal: 'environment' },
          width: { ideal: 1920 },
          height: { ideal: 1440 }
        }
      };

      const fallback = { audio: false, video: true };

      try {
        STATE.stream = await navigator.mediaDevices.getUserMedia(preferred);
      } catch (err) {
        try {
          STATE.stream = await navigator.mediaDevices.getUserMedia(fallback);
        } catch (err2) {
          console.error(err2);
          showToast('Camera permission denied or no camera found', true);
          return;
        }
      }

      video.srcObject = STATE.stream;

      try {
        await video.play();
      } catch (err) {
        console.error(err);
        showToast('Could not start camera preview', true);
        return;
      }

      captureBtn.disabled = false;
      hideToast();
      syncPreviewCanvas();
      startPreviewLoop();
    }

    async function toggleFullscreen() {
      try {
        if (document.fullscreenElement) {
          await document.exitFullscreen();
        } else {
          await appRoot.requestFullscreen();
        }
      } catch (err) {
        console.error(err);
        showToast('Fullscreen blocked by this browser');
      }
    }

    captureBtn.addEventListener('click', capturePhoto);
    retakeBtn.addEventListener('click', retake);
    saveBtn.addEventListener('click', saveCurrentImage);
    fullscreenBtn.addEventListener('click', toggleFullscreen);

    document.addEventListener('fullscreenchange', () => {
      fullscreenBtn.style.opacity = document.fullscreenElement ? '0.92' : '1';
      setTimeout(() => {
        syncPreviewCanvas();
      }, 80);
    });

    window.addEventListener('resize', () => {
      syncPreviewCanvas();
      if (!STATE.captured && video.readyState >= 2) {
        const mode = MODES[STATE.mode];
        const result = processFrame(STATE.mode, mode.previewLongEdge);
        if (result) {
          const pctx = preview.getContext('2d');
          pctx.clearRect(0, 0, preview.width, preview.height);
          pctx.drawImage(result.canvas, 0, 0, preview.width, preview.height);
        }
      }
    });

    window.addEventListener('beforeunload', () => {
      cancelAnimationFrame(STATE.previewRAF);
      if (STATE.stream) STATE.stream.getTracks().forEach(track => track.stop());
      if (STATE.lastBlobUrl) URL.revokeObjectURL(STATE.lastBlobUrl);
    });

    buildModeButtons();
    startCamera();
  </script>
</body>
</html>
